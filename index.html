<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業員總生產時間分析 - 戰情室看板</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Courier New', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <!-- SheetJS & Chart.js -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <!-- Google Fonts & Phosphor Icons (for standard icons) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { 
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 現代感滾動條 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* 卡片基礎風格 */
        .base-card {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 數據與標籤 */
        .stat-label {
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
        }

        /* 檔案上傳區 */
        .upload-area {
            border: 2px dashed #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .dark .upload-area { border-color: #334155; }
        .upload-area:hover { border-color: #0ea5e9; background-color: rgba(14, 165, 233, 0.05); }
        .upload-area.has-file { border-color: #0ea5e9; border-style: solid; background-color: rgba(14, 165, 233, 0.05); }

        /* 圓環圖與圖例 */
        .chart-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 280px;
            padding: 5px;
        }
        .chart-canvas-container-narrow { width: 160px; height: 160px; position: relative; }
        .chart-canvas-container-wide { width: 180px; height: 180px; position: relative; }
        
        .chart-legend-container {
            flex: 1;
            margin-left: 24px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .legend-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        
        .legend-color { width: 6px; height: 20px; border-radius: 3px; margin-right: 12px; }
        .percent-text { font-family: 'JetBrains Mono', monospace; font-size: 1.125rem; font-weight: 700; }

        /* 時序圖 (簡約現代版) */
        .day-row { display: flex; align-items: center; margin-bottom: 28px; }
        .day-label {
            width: 100px; flex-shrink: 0;
            font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 14px;
        }
        .timeline-track {
            flex-grow: 1; height: 40px; border-radius: 6px; position: relative; overflow: visible;
        }

        .shift-zone {
            position: absolute; top: 0; bottom: 0;
            z-index: 0;
            border-left: 1px dashed;
            border-right: 1px dashed;
        }

        .timeline-grid { position: absolute; top: 0; bottom: 0; width: 1px; z-index: 1; }
        .hour-mark {
            position: absolute; top: -20px; transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
        }

        /* 生產時間區塊 */
        .block-v2 {
            position: absolute; top: 6px; height: 28px; border-radius: 4px; cursor: pointer; transition: all 0.2s; z-index: 10;
        }
        .block-v2:hover { transform: scaleY(1.1); z-index: 50; filter: brightness(1.1); }
        
        /* 正常/異常工時顏色 */
        .bg-normal-v2 { background-color: #3b82f6; border: 1px solid rgba(0,0,0,0.1); }
        .bg-overlap-v2 { background-color: #ef4444; border: 1px solid rgba(0,0,0,0.1); z-index: 20; }

        /* Tooltip */
        #custom-tooltip {
            position: fixed; pointer-events: none; z-index: 99999;
            padding: 12px 16px; border-radius: 8px; font-size: 13px;
            display: none; max-width: 320px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* 表格樣式 */
        table th { position: sticky; top: 0; z-index: 10; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-colors duration-300">

    <!-- Tooltip 容器 -->
    <div id="custom-tooltip" class="bg-white text-slate-800 dark:bg-slate-800 dark:text-slate-200 border border-slate-200 dark:border-slate-700"></div>

    <!-- 頂部導航 -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 py-4 px-8 sticky top-0 z-40 transition-colors duration-300">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="p-2.5 bg-brand-50 dark:bg-brand-900/30 border border-brand-200 dark:border-brand-800 rounded-lg text-brand-600 dark:text-brand-400">
                    <i class="ph ph-chart-line-up text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-slate-900 dark:text-white">作業員工時分析系統</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs mt-0.5 font-medium">塑膠射出廠 • 數據分析引擎</p>
                </div>
            </div>
            
            <div class="flex items-center mt-4 md:mt-0 space-x-4">
                <!-- 狀態顯示 -->
                <div id="status-display" class="hidden flex items-center space-x-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-md">
                    <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-xs font-bold text-slate-700 dark:text-slate-300 tracking-wide" id="status-text">系統就緒</span>
                </div>
                <!-- 深淺色切換按鈕 -->
                <button onclick="toggleTheme()" class="p-2.5 rounded-md bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <i id="theme-icon" class="ph ph-moon text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側控制欄 -->
            <aside class="lg:col-span-3 space-y-6">
                <!-- 上傳區 -->
                <section class="base-card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6 shadow-sm">
                    <h2 class="text-base font-bold text-slate-800 dark:text-white mb-5 flex items-center">
                        <i class="ph ph-hard-drives mr-2 text-brand-500 text-lg"></i>
                        資料載入
                    </h2>
                    <label for="file-upload" id="drop-zone" class="upload-area w-full h-36 rounded-lg flex flex-col items-center justify-center space-y-3 group text-center px-4 bg-slate-50 dark:bg-slate-900/50">
                        <div id="upload-icon" class="text-slate-400 group-hover:text-brand-500 transition-colors">
                            <i class="ph ph-cloud-arrow-up text-4xl"></i>
                        </div>
                        <div id="file-info-container">
                            <span id="file-instruction" class="block text-sm text-slate-500 dark:text-slate-400">請上傳工單人員記錄表 (Excel/CSV)</span>
                            <span id="file-name-display" class="hidden block text-sm font-medium text-brand-600 dark:text-brand-400 break-all mt-2"></span>
                        </div>
                        <input type="file" id="file-upload" class="hidden" accept=".csv, .xlsx" onchange="onFileChanged(this)">
                    </label>
                    <button id="analyze-btn" onclick="triggerProcess()" disabled class="w-full mt-5 py-3 rounded-lg text-sm font-bold bg-brand-600 hover:bg-brand-700 text-white disabled:bg-slate-300 dark:disabled:bg-slate-700 disabled:text-slate-500 transition-colors cursor-pointer disabled:cursor-not-allowed">
                        開始分析資料
                    </button>
                </section>

                <!-- 篩選區 -->
                <section id="filter-card" class="base-card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6 shadow-sm hidden">
                    <h2 class="text-base font-bold text-slate-800 dark:text-white mb-5 flex items-center">
                        <i class="ph ph-faders mr-2 text-brand-500 text-lg"></i>
                        參數與資料篩選
                    </h2>
                    <div class="space-y-6">
                        <!-- 日期過濾 -->
                        <div>
                            <label class="stat-label text-slate-600 dark:text-slate-400 block mb-2">日期範圍</label>
                            <select id="date-picker" onchange="refreshView()" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-3 text-sm font-medium text-slate-800 dark:text-slate-200 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none cursor-pointer">
                                <option value="ALL">全部紀錄 (累計)</option>
                            </select>
                        </div>
                        <!-- 廠區過濾 -->
                        <div>
                            <label class="stat-label text-slate-600 dark:text-slate-400 block mb-2">廠區篩選</label>
                            <div class="grid grid-cols-1 gap-2">
                                <button onclick="setFactoryFilter('ALL')" id="factory-all" class="px-4 py-2.5 rounded-md border-2 border-brand-500 bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-400 font-bold text-sm transition-all">全廠區</button>
                                <button onclick="setFactoryFilter('G')" id="factory-g" class="px-4 py-2.5 rounded-md border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:border-brand-500 hover:text-brand-600 dark:hover:text-brand-400 font-medium text-sm transition-all">宗瑋廠區 (G)</button>
                                <button onclick="setFactoryFilter('D')" id="factory-d" class="px-4 py-2.5 rounded-md border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:border-brand-500 hover:text-brand-600 dark:hover:text-brand-400 font-medium text-sm transition-all">博士廠區 (D)</button>
                            </div>
                        </div>
                        <!-- 關鍵字搜尋 -->
                        <div class="pt-2 border-t border-slate-200 dark:border-slate-700">
                            <label class="stat-label text-slate-600 dark:text-slate-400 block mb-2">關鍵字搜尋</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="ph ph-magnifying-glass text-slate-400"></i>
                                </div>
                                <input type="text" id="search-input" onkeyup="renderView()" placeholder="輸入姓名或員工代號..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg text-sm text-slate-800 dark:text-slate-200 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none placeholder-slate-400">
                            </div>
                        </div>
                    </div>
                </section>
            </aside>

            <!-- 右側內容區 -->
            <div class="lg:col-span-9 space-y-6">
                <!-- KPI 卡片區 -->
                <div id="stats-dashboard" class="grid grid-cols-1 gap-6 hidden">
                    <!-- 頂部三個數據卡 -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- 總人數 -->
                        <div class="base-card bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 border-l-4 border-l-blue-500">
                            <p class="stat-label text-slate-500 dark:text-slate-400 mb-2">總作業人數</p>
                            <div class="flex items-baseline"><span id="stat-workers" class="stat-number text-slate-800 dark:text-white">0</span><span class="text-sm font-medium text-slate-500 dark:text-slate-400 ml-2">人</span></div>
                        </div>
                        
                        <!-- 異常工時人數 -->
                        <div class="base-card bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 border-l-4 border-l-rose-500">
                            <p class="stat-label text-slate-500 dark:text-slate-400 mb-2">異常工時人數</p>
                            <div class="flex items-baseline"><span id="stat-abnormal" class="stat-number text-rose-600 dark:text-rose-400">0</span><span id="stat-ab-perc" class="text-sm font-medium text-rose-600/70 dark:text-rose-400/70 ml-2">0%</span></div>
                            <p class="text-xs text-rose-500/70 dark:text-rose-400/70 mt-1 font-medium">低於或超出標準工時</p>
                        </div>

                        <!-- 平均生產工時 -->
                        <div id="card-avg" class="base-card bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 border-l-4 transition-colors duration-300">
                            <p id="label-avg" class="stat-label text-slate-500 dark:text-slate-400 mb-2">平均生產工時</p>
                            <div class="flex items-baseline"><span id="stat-avg" class="stat-number text-slate-800 dark:text-white">00:00:00</span><span id="unit-avg" class="text-sm font-medium text-slate-500 dark:text-slate-400 ml-2">小時/人</span></div>
                        </div>
                    </div>

                    <!-- 圓餅圖區塊 -->
                    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
                        <div class="base-card bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 xl:col-span-5">
                            <h3 class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-4 flex items-center"><i class="ph ph-buildings mr-2"></i>廠區人數分佈</h3>
                            <div class="chart-wrapper">
                                <div class="chart-canvas-container-narrow shrink-0">
                                    <canvas id="chart-factory"></canvas>
                                </div>
                                <div id="legend-factory" class="chart-legend-container"></div>
                            </div>
                        </div>
                        <div class="base-card bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 xl:col-span-7">
                            <h3 class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-4 flex items-center"><i class="ph ph-chart-pie-slice mr-2"></i>前十大製程分佈</h3>
                            <div class="chart-wrapper">
                                <div class="chart-canvas-container-wide shrink-0">
                                    <canvas id="chart-process"></canvas>
                                </div>
                                <div id="legend-process" class="chart-legend-container"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 列表顯示區 -->
                <section id="table-container" class="base-card bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 hidden overflow-hidden">
                    <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                        <h2 class="text-base font-bold text-slate-800 dark:text-white flex items-center"><i class="ph ph-table mr-2 text-brand-500"></i>生產效率矩陣</h2>
                        <span id="row-count" class="text-xs font-medium bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1 rounded-full"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="bg-slate-100 dark:bg-slate-900/50 text-slate-600 dark:text-slate-400">
                                <tr>
                                    <th class="py-4 pl-6 pr-4 font-semibold cursor-pointer hover:text-brand-600 dark:hover:text-brand-400 transition-colors" onclick="handleSort(0)">員工代號 <span id="s-0" class="ml-1 text-xs"></span></th>
                                    <th class="py-4 px-4 font-semibold">姓名</th>
                                    <th class="py-4 px-4 text-center font-semibold">班別</th>
                                    <th class="py-4 px-4 font-semibold cursor-pointer hover:text-brand-600 dark:hover:text-brand-400 transition-colors" onclick="handleSort(2)">淨生產工時 <span id="s-2" class="ml-1 text-xs">▼</span></th>
                                    <th id="th-avg-daily" class="py-4 px-4 font-semibold">日平均工時</th>
                                    <th class="py-4 pr-6 pl-4 text-center font-semibold">工單數</th>
                                </tr>
                            </thead>
                            <tbody id="main-table-body" class="divide-y divide-slate-100 dark:divide-slate-800/60"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- 專屬浮水印 -->
    <div class="fixed bottom-4 right-5 z-[40] pointer-events-none bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-4 py-2 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 transition-colors duration-300">
        <p class="text-[10px] font-mono font-bold text-slate-500 dark:text-slate-400 tracking-widest uppercase">
            Crafted by <span class="font-black text-brand-600 dark:text-brand-400 ml-1">勝全</span> <span class="text-brand-500 ml-1">✕ AI</span>
        </p>
    </div>

    <!-- 人員詳情 Modal -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 md:p-6 opacity-0 transition-opacity duration-300" onclick="closeModal()">
        <div class="bg-white dark:bg-slate-800 w-full max-w-7xl max-h-[96vh] rounded-xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()" id="modal-content">
            
            <!-- Modal Header -->
            <div class="p-6 md:p-8 border-b border-slate-200 dark:border-slate-700 flex justify-between items-start md:items-center bg-slate-50 dark:bg-slate-900/30 flex-col md:flex-row gap-4 relative">
                <div class="absolute left-0 top-0 w-1.5 h-full bg-brand-500"></div>
                <div class="flex items-center space-x-5 z-10 pl-2">
                    <div class="w-16 h-16 rounded-full bg-brand-100 dark:bg-brand-900/50 text-brand-600 dark:text-brand-400 flex items-center justify-center text-2xl font-bold font-mono border-2 border-brand-200 dark:border-brand-800" id="modal-avatar">?</div>
                    <div>
                        <div class="flex items-center flex-wrap gap-3">
                            <h3 id="m-name" class="text-2xl font-bold text-slate-900 dark:text-white">載入中...</h3>
                            <span id="m-shift-tag" class="px-2.5 py-1 text-xs font-bold rounded-md"></span>
                        </div>
                        <p id="m-meta" class="text-slate-500 dark:text-slate-400 mt-2 text-sm"></p>
                    </div>
                </div>
                <button onclick="closeModal()" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors z-10">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="p-6 md:p-8 overflow-y-auto space-y-10">
                <!-- 時序圖區塊 -->
                <div>
                    <h4 class="text-base font-bold text-slate-800 dark:text-white mb-6 flex items-center justify-between border-b border-slate-200 dark:border-slate-700 pb-3">
                        <div class="flex items-center">
                            <i class="ph ph-clock-countdown mr-2 text-brand-500"></i>
                            時間軸分佈
                        </div>
                        <div class="flex items-center gap-4 text-xs font-medium text-slate-500 dark:text-slate-400">
                            <div class="flex items-center"><span class="w-3 h-3 rounded bg-blue-500 mr-2"></span>正常工時</div>
                            <div class="flex items-center"><span class="w-3 h-3 rounded bg-red-500 mr-2"></span>重疊/異常警告</div>
                        </div>
                    </h4>
                    <div id="modal-timeline-v2" class="space-y-6 pt-2">
                        <!-- 由 JS 生成分日橫條 -->
                    </div>
                </div>

                <!-- 數據表格 -->
                <div>
                    <h4 class="text-base font-bold text-slate-800 dark:text-white mb-4 flex items-center border-b border-slate-200 dark:border-slate-700 pb-3">
                        <i class="ph ph-list-numbers mr-2 text-brand-500"></i>
                        工單明細紀錄
                    </h4>
                    <div class="border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-100 dark:bg-slate-900/50">
                                <tr class="text-xs font-semibold text-slate-600 dark:text-slate-400">
                                    <th class="px-6 py-3 border-b border-slate-200 dark:border-slate-700">製程</th>
                                    <th class="px-6 py-3 border-b border-slate-200 dark:border-slate-700">工單單號</th>
                                    <th class="px-6 py-3 border-b border-slate-200 dark:border-slate-700">執行時間</th>
                                    <th class="px-6 py-3 border-b border-slate-200 dark:border-slate-700 text-right">耗時</th>
                                </tr>
                            </thead>
                            <tbody id="m-table-body" class="text-sm divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 深淺色切換邏輯 ---
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            
            if (isDark) {
                icon.classList.replace('ph-sun', 'ph-moon');
                localStorage.setItem('theme', 'dark');
            } else {
                icon.classList.replace('ph-moon', 'ph-sun');
                localStorage.setItem('theme', 'light');
            }
            // 重新渲染圖表以配合文字顏色
            if(Object.keys(charts).length > 0) {
                Chart.defaults.color = isDark ? '#94a3b8' : '#64748b';
                Object.values(charts).forEach(chart => chart.update());
            }
        }

        // 初始化主題
        if (localStorage.getItem('theme') === 'light' || (!localStorage.getItem('theme') && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
            document.getElementById('theme-icon').classList.replace('ph-moon', 'ph-sun');
        }

        // --- 核心變數設定 ---
        let rawRecords = [];
        let processedData = {};
        let tableData = [];
        let currentFactory = 'ALL';
        let currentSort = { col: 2, dir: 'desc' };
        let charts = {}; 
        
        const KEYS = { ID: '員工代號', NAME: '員工姓名', START: '開始生產時間', END: '結束生產時間', PROC: '製程', ORDER: '工單單號' };
        const ERR_MIN = 8 * 3600 * 1000;
        const ERR_MAX = 14 * 3600 * 1000;

        // 現代商業配色
        const MODERN_COLORS = [
            '#0ea5e9', // Sky 500
            '#8b5cf6', // Violet 500
            '#10b981', // Emerald 500
            '#f59e0b', // Amber 500
            '#f43f5e', // Rose 500
            '#3b82f6', // Blue 500
            '#ec4899', // Pink 500
            '#14b8a6', // Teal 500
            '#f97316', // Orange 500
            '#64748b'  // Slate 500
        ];

        // --- Tooltip 控制邏輯 ---
        const tooltip = document.getElementById('custom-tooltip');
        function showTooltip(e, content) {
            tooltip.innerHTML = content;
            tooltip.style.display = 'block';
            updateTooltipPos(e);
        }
        function updateTooltipPos(e) {
            let x = e.clientX + 15;
            let y = e.clientY + 15;
            const tw = tooltip.offsetWidth;
            const th = tooltip.offsetHeight;
            if (x + tw > window.innerWidth) x = e.clientX - tw - 15;
            if (y + th > window.innerHeight) y = e.clientY - th - 15;
            tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
        }
        function hideTooltip() { tooltip.style.display = 'none'; }

        // 初始化 Chart.js
        window.onload = function() {
            if (typeof Chart !== 'undefined') {
                if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
                Chart.defaults.font.family = "'Inter', 'Noto Sans TC', sans-serif";
                Chart.defaults.color = document.documentElement.classList.contains('dark') ? '#94a3b8' : '#64748b';
            }
        };

        // --- 時間格式化小工具 ---
        function fmtHms(ms) {
            if (isNaN(ms) || ms < 0) return "00:00:00";
            let s = Math.floor(ms / 1000);
            return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }
        function fmtDt(ts) { const d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
        function fmtDay(ts) { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

        function getLogicalDay(ts) {
            const d = new Date(ts);
            const h = d.getHours();
            if (h < 7) {
                const prev = new Date(ts);
                prev.setDate(prev.getDate() - 1);
                return fmtDay(prev.getTime());
            }
            return fmtDay(ts);
        }

        function setStatus(msg) {
            const box = document.getElementById('status-display');
            box.classList.remove('hidden');
            document.getElementById('status-text').innerText = msg;
        }

        // --- 檔案上傳事件 ---
        function onFileChanged(input) {
            const fileName = input.files[0] ? input.files[0].name : "";
            const nameDisplay = document.getElementById('file-name-display');
            const instruction = document.getElementById('file-instruction');
            const dropZone = document.getElementById('drop-zone');

            if (fileName) {
                nameDisplay.innerText = `[已選取檔案]: ${fileName}`;
                nameDisplay.classList.remove('hidden');
                instruction.classList.add('hidden');
                dropZone.classList.add('has-file');
                document.getElementById('analyze-btn').disabled = false;
            } else {
                nameDisplay.classList.add('hidden');
                instruction.classList.remove('hidden');
                dropZone.classList.remove('has-file');
                document.getElementById('analyze-btn').disabled = true;
            }
        }

        // --- 解析 Excel ---
        async function triggerProcess() {
            setStatus("解析資料中...");
            const btn = document.getElementById('analyze-btn');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin mr-2"></i>處理中...';
            btn.disabled = true;
            
            setTimeout(() => {
                const file = document.getElementById('file-upload').files[0];
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                        rawRecords = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        
                        const dates = [...new Set(rawRecords.map(r => r[KEYS.START] ? getLogicalDay(new Date(r[KEYS.START]).getTime()) : null).filter(Boolean))].sort().reverse();
                        const dp = document.getElementById('date-picker');
                        dp.innerHTML = '<option value="ALL">全部紀錄 (累計)</option>';
                        dates.forEach(d => dp.innerHTML += `<option value="${d}">${d}</option>`);
                        if(dates.length) dp.value = dates[0];

                        document.getElementById('filter-card').classList.remove('hidden');
                        document.getElementById('stats-dashboard').classList.remove('hidden');
                        document.getElementById('table-container').classList.remove('hidden');
                        
                        refreshView();
                        setStatus("系統就緒");
                    } catch (error) {
                        alert("資料錯誤：檔案解析失敗。請確認格式。");
                        setStatus("系統錯誤");
                    } finally {
                        btn.innerText = '重新計算資料';
                        btn.disabled = false;
                    }
                };
                reader.readAsArrayBuffer(file);
            }, 300);
        }

        function getDayShiftMs(start, end) {
            let total = 0;
            let cur = new Date(start);
            const targetEnd = new Date(end);
            while (cur < targetEnd) {
                let dStart = new Date(cur); dStart.setHours(7, 0, 0, 0); 
                let dEnd = new Date(cur); dEnd.setHours(19, 0, 0, 0); 
                let oS = Math.max(cur.getTime(), dStart.getTime());
                let oE = Math.min(targetEnd.getTime(), dEnd.getTime());
                if (oE > oS) total += (oE - oS);
                let next = new Date(cur); next.setDate(next.getDate() + 1); next.setHours(0, 0, 0, 0);
                cur = next < targetEnd ? next : targetEnd;
            }
            return total;
        }

        // --- 資料運算與重整 ---
        function refreshView() {
            if(rawRecords.length === 0) return;
            const filterDate = document.getElementById('date-picker').value;
            let targetRecords = filterDate === 'ALL' ? rawRecords : rawRecords.filter(r => getLogicalDay(new Date(r[KEYS.START]).getTime()) === filterDate);
            
            processedData = {};
            const opMap = {};
            const processUsers = {};

            targetRecords.forEach(r => {
                const id = r[KEYS.ID], start = new Date(r[KEYS.START]).getTime(), end = new Date(r[KEYS.END]).getTime(), proc = r[KEYS.PROC] || '未分類';
                if (!id || isNaN(start) || isNaN(end) || end <= start) return;
                
                if (!opMap[id]) opMap[id] = { name: r[KEYS.NAME]||'?', intervals: [], raw: [], min: Infinity, max: -Infinity, dates: new Set() };
                opMap[id].intervals.push({start, end, proc, order: r[KEYS.ORDER]});
                opMap[id].raw.push(r);
                opMap[id].min = Math.min(opMap[id].min, start);
                opMap[id].max = Math.max(opMap[id].max, end);
                opMap[id].dates.add(getLogicalDay(start));

                if(!processUsers[proc]) processUsers[proc] = new Set();
                processUsers[proc].add(id);
            });

            tableData = [];
            for (const id in opMap) {
                const data = opMap[id];
                data.intervals.sort((a,b) => a.start - b.start);
                
                let totalDayMs = 0;
                let totalWorkMs = 0;
                data.intervals.forEach(i => {
                    totalWorkMs += (i.end - i.start);
                    totalDayMs += getDayShiftMs(i.start, i.end);
                });

                const shift = (totalDayMs >= (totalWorkMs * 0.5)) ? 'DAY' : 'NIGHT';

                let overlapCheck = [], sortedPoints = [];
                data.intervals.forEach(i => { 
                    sortedPoints.push({time: i.start, type: 1, info: i}); 
                    sortedPoints.push({time: i.end, type: -1, info: i}); 
                });
                sortedPoints.sort((a,b) => a.time - b.time || a.type);
                
                let active = 0, currentStart = null;
                let activeIntervals = new Set();
                for(let p of sortedPoints) {
                    if(active > 0 && currentStart !== null && p.time > currentStart) {
                        overlapCheck.push({ start: currentStart, end: p.time, count: active, details: Array.from(activeIntervals) });
                    }
                    if (p.type === 1) { active++; activeIntervals.add(p.info); }
                    else { active--; activeIntervals.delete(p.info); }
                    currentStart = p.time;
                }

                let netTotal = 0;
                if(data.intervals.length) {
                    let s = data.intervals[0].start, e = data.intervals[0].end;
                    for(let i=1; i<data.intervals.length; i++) {
                        if(data.intervals[i].start <= e) e = Math.max(e, data.intervals[i].end);
                        else { netTotal += (e-s); s = data.intervals[i].start; e = data.intervals[i].end; }
                    }
                    netTotal += (e-s);
                }
                
                const dayCount = data.dates.size || 1; 
                const obj = { id, name: data.name, totalMs: netTotal, count: data.raw.length, shift, dayCount };
                tableData.push(obj);
                processedData[id] = { ...obj, raw: data.raw, min: data.min, max: data.max, overlapBlocks: overlapCheck };
            }

            renderDashboard(processUsers);
            renderView(); // 會順便執行搜尋過濾
        }

        // --- 渲染圖表與卡片 ---
        function renderDashboard(processUsers) {
            let filtered = tableData.filter(d => {
                if (currentFactory === 'G') return String(d.id).startsWith('G');
                if (currentFactory === 'D') return String(d.id).startsWith('D');
                return true;
            });

            let ab = 0, sum = 0, gCount = 0, dCount = 0, totalDaysAccumulated = 0;
            filtered.forEach(d => {
                sum += d.totalMs;
                totalDaysAccumulated += d.dayCount;
                if (d.totalMs < (ERR_MIN * d.dayCount) || d.totalMs > (ERR_MAX * d.dayCount)) ab++;
                if (String(d.id).startsWith('G')) gCount++; else if (String(d.id).startsWith('D')) dCount++;
            });

            document.getElementById('stat-workers').innerText = filtered.length;
            document.getElementById('stat-abnormal').innerText = ab;
            document.getElementById('stat-ab-perc').innerText = filtered.length ? Math.round(ab/filtered.length*100) + '%' : '0%';
            
            const avgMs = filtered.length ? sum/filtered.length : 0;
            document.getElementById('stat-avg').innerText = fmtHms(avgMs);
            const avgDays = filtered.length ? totalDaysAccumulated / filtered.length : 1;

            const card = document.getElementById('card-avg');
            
            card.classList.remove('border-l-amber-400', 'border-l-rose-500', 'border-l-blue-500');

            if (avgMs < ERR_MIN * avgDays) {
                card.classList.add('border-l-amber-400');
            } else if (avgMs > ERR_MAX * avgDays) {
                card.classList.add('border-l-rose-500');
            } else {
                card.classList.add('border-l-blue-500');
            }
            
            updateChartWithLegend('chart-factory', 'legend-factory', ['宗瑋廠區', '博士廠區'], [gCount, dCount], [MODERN_COLORS[0], MODERN_COLORS[4]]);

            const sortedProc = Object.entries(processUsers).map(([k,v]) => [k, v.size]).sort((a,b) => b[1]-a[1]);
            const topProc = sortedProc.slice(0, 10);
            updateChartWithLegend('chart-process', 'legend-process', topProc.map(p=>p[0]), topProc.map(p=>p[1]), MODERN_COLORS.slice(0, topProc.length));
        }

        function updateChartWithLegend(canvasId, legendId, labels, data, colors) {
            if (charts[canvasId]) charts[canvasId].destroy();
            const total = data.reduce((a, b) => a + b, 0);
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            const isDarkMode = document.documentElement.classList.contains('dark');
            const borderColor = isDarkMode ? '#1e293b' : '#ffffff';

            charts[canvasId] = new Chart(ctx, {
                type: 'doughnut', 
                data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: borderColor, hoverOffset: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
            });
            
            const legendContainer = document.getElementById(legendId); legendContainer.innerHTML = '';
            labels.forEach((label, i) => {
                const percent = total > 0 ? ((data[i]/total)*100).toFixed(1) : 0;
                // 優化後的圖例排版：Flex 佈局，讓文字佔據足夠空間
                legendContainer.innerHTML += `
                <div class="legend-item bg-slate-50 dark:bg-slate-700/50 hover:bg-slate-100 dark:hover:bg-slate-700">
                    <div class="flex items-center flex-1">
                        <div class="legend-color shadow-sm" style="background:${colors[i]}"></div>
                        <span class="text-sm font-semibold text-slate-700 dark:text-slate-200">${label}</span>
                    </div>
                    <span class="percent-text text-slate-800 dark:text-white">${percent}%</span>
                </div>`;
            });
        }

        // --- 渲染表格 (包含關鍵字搜尋) ---
        function renderView() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();

            let filtered = tableData.filter(d => {
                let matchFactory = true;
                if (currentFactory === 'G') matchFactory = String(d.id).startsWith('G');
                if (currentFactory === 'D') matchFactory = String(d.id).startsWith('D');
                
                let matchKeyword = true;
                if (keyword !== '') {
                    matchKeyword = String(d.id).toLowerCase().includes(keyword) || String(d.name).toLowerCase().includes(keyword);
                }

                return matchFactory && matchKeyword;
            });

            filtered.sort((a,b) => {
                let v1 = a.totalMs, v2 = b.totalMs;
                if(currentSort.col === 0) { v1 = String(a.id); v2 = String(b.id); }
                return currentSort.dir === 'asc' ? (v1 > v2 ? 1 : -1) : (v1 < v2 ? 1 : -1);
            });

            document.getElementById('s-0').innerText = currentSort.col === 0 ? (currentSort.dir === 'asc' ? '▲' : '▼') : '';
            document.getElementById('s-2').innerText = currentSort.col === 2 ? (currentSort.dir === 'asc' ? '▲' : '▼') : '';

            const filterDate = document.getElementById('date-picker').value;
            const isAll = filterDate === 'ALL';
            document.getElementById('th-avg-daily').style.display = isAll ? 'table-cell' : 'none';

            const tbody = document.getElementById('main-table-body');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-500">找不到符合的資料</td></tr>`;
            }

            filtered.forEach(d => {
                let badgeClass = "text-blue-700 bg-blue-50 border border-blue-200 dark:text-blue-300 dark:bg-blue-900/30 dark:border-blue-800/50";
                if (d.totalMs < ERR_MIN * d.dayCount) badgeClass = "text-amber-700 bg-amber-50 border border-amber-200 dark:text-amber-300 dark:bg-amber-900/30 dark:border-amber-800/50";
                else if (d.totalMs > ERR_MAX * d.dayCount) badgeClass = "text-rose-700 bg-rose-50 border border-rose-200 dark:text-rose-300 dark:bg-rose-900/30 dark:border-rose-800/50";

                const tr = document.createElement('tr');
                tr.className = "cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/60 transition-colors";
                tr.onclick = () => openDetails(d.id);
                
                const shiftTag = d.shift === 'DAY' 
                    ? '<span class="px-2.5 py-1 bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300 text-xs font-bold rounded-md">日班</span>'
                    : '<span class="px-2.5 py-1 bg-slate-800 text-slate-100 dark:bg-slate-700 dark:text-slate-300 text-xs font-bold rounded-md">夜班</span>';

                tr.innerHTML = `
                    <td class="py-4 pl-6 pr-4 font-bold text-slate-800 dark:text-slate-200">${d.id}</td>
                    <td class="px-4 text-slate-600 dark:text-slate-300">${d.name}</td>
                    <td class="text-center px-4">${shiftTag}</td>
                    <td class="px-4"><span class="px-3 py-1.5 rounded-md font-mono text-sm ${badgeClass}">${fmtHms(d.totalMs)}</span></td>
                    <td style="display:${isAll?'table-cell':'none'}" class="px-4 text-slate-500 dark:text-slate-400 font-mono text-sm">${fmtHms(d.totalMs/d.dayCount)}</td>
                    <td class="text-center px-4 pr-6 text-slate-600 dark:text-slate-300 font-medium">${d.count}</td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('row-count').innerText = `顯示筆數：${filtered.length}`;
        }

        function handleSort(col) {
            if(currentSort.col === col) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
            else { currentSort.col = col; currentSort.dir = 'desc'; }
            renderView();
        }

        function setFactoryFilter(f) {
            currentFactory = f;
            const btnActive = "px-4 py-2.5 rounded-md border-2 border-brand-500 bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-400 font-bold text-sm transition-all";
            const btnInactive = "px-4 py-2.5 rounded-md border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:border-brand-500 hover:text-brand-600 dark:hover:text-brand-400 font-medium text-sm transition-all";
            
            ['ALL','G','D'].forEach(t => {
                const btn = document.getElementById(`factory-${t.toLowerCase()}`);
                btn.className = (t === f) ? btnActive : btnInactive;
            });
            renderView(); // 使用 renderView 即可套用搜尋與廠區過濾
        }

        // --- 開啟 Modal ---
        function openDetails(id) {
            const data = processedData[id];
            document.getElementById('modal-avatar').innerText = data.name.charAt(0);
            document.getElementById('m-name').innerText = `${data.id} ${data.name}`;
            
            const shiftTag = document.getElementById('m-shift-tag');
            if(data.shift === 'DAY') {
                shiftTag.innerText = '日班';
                shiftTag.className = 'px-3 py-1 bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300 text-sm font-bold rounded-md';
            } else {
                shiftTag.innerText = '夜班';
                shiftTag.className = 'px-3 py-1 bg-slate-800 text-slate-100 dark:bg-slate-700 dark:text-slate-300 text-sm font-bold rounded-md';
            }
            
            document.getElementById('m-meta').innerText = `淨生產工時: ${fmtHms(data.totalMs)} │ 出勤天數: ${data.dayCount} │ 總工單數: ${data.count}`;
            
            const container = document.getElementById('modal-timeline-v2');
            container.innerHTML = '';

            const visualBlocksByDate = {};
            
            data.overlapBlocks.forEach(b => {
                let currentStart = b.start;
                const finalEnd = b.end;

                while (currentStart < finalEnd) {
                    const startDayStr = fmtDay(currentStart);
                    const dayEndTs = new Date(startDayStr + "T23:59:59.999").getTime();
                    const currentEnd = Math.min(finalEnd, dayEndTs + 1); 

                    if (!visualBlocksByDate[startDayStr]) visualBlocksByDate[startDayStr] = [];

                    visualBlocksByDate[startDayStr].push({ ...b, visualStart: currentStart, visualEnd: currentEnd });
                    currentStart = currentEnd; 
                }
            });

            const sortedDays = Object.keys(visualBlocksByDate).sort().reverse();
            const msPerDay = 24 * 3600 * 1000;

            sortedDays.forEach(dayStr => {
                const dayRow = document.createElement('div');
                dayRow.className = "day-row";
                
                const label = document.createElement('div');
                label.className = "day-label text-slate-700 dark:text-slate-300";
                label.innerText = dayStr.split('-').slice(1).join('/'); // 01/19
                
                const track = document.createElement('div');
                track.className = "timeline-track bg-slate-100 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700";

                // 背景：日班標示 (07:00 - 19:00)
                const shiftZone = document.createElement('div');
                shiftZone.className = "shift-zone border-slate-300 bg-slate-200/50 dark:border-slate-600 dark:bg-slate-700/30";
                shiftZone.style.left = (7 / 24 * 100) + '%'; 
                shiftZone.style.width = (12 / 24 * 100) + '%';
                track.appendChild(shiftZone);

                for(let h=0; h<=24; h+=4) {
                    const grid = document.createElement('div');
                    grid.className = "timeline-grid bg-slate-300 dark:bg-slate-600";
                    grid.style.left = (h / 24 * 100) + '%';
                    if (h < 24) {
                        const mark = document.createElement('div');
                        mark.className = "hour-mark text-slate-400";
                        mark.innerText = h + ':00';
                        grid.appendChild(mark);
                    }
                    track.appendChild(grid);
                }

                const dayStartTs = new Date(dayStr + "T00:00:00").getTime();
                
                visualBlocksByDate[dayStr].forEach(b => {
                    const block = document.createElement('div');
                    const isOverlap = b.count > 1;
                    block.className = `block-v2 ${isOverlap ? 'bg-overlap-v2' : 'bg-normal-v2'}`;
                    
                    const startOffset = Math.max(0, b.visualStart - dayStartTs);
                    const duration = b.visualEnd - b.visualStart;
                    
                    block.style.left = (startOffset / msPerDay * 100) + '%';
                    block.style.width = Math.max(0.2, (duration / msPerDay * 100)) + '%';
                    
                    const detailHtml = b.details.map(d => `
                        <div class="border-b border-slate-200 dark:border-slate-600 pb-2 mb-2 last:border-0 last:mb-0">
                            <div class="text-brand-600 dark:text-brand-400 font-bold">${d.order}</div>
                            <div class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">${d.proc}</div>
                            <div class="text-xs text-slate-700 dark:text-slate-300 mt-1">${fmtDt(d.start)} -> ${fmtDt(d.end)}</div>
                        </div>
                    `).join('');

                    block.onmouseenter = (e) => showTooltip(e, `
                        <div class="font-bold text-sm mb-3 flex items-center border-b border-slate-200 dark:border-slate-600 pb-2 ${isOverlap ? 'text-rose-500' : 'text-blue-500'}">
                            ${isOverlap ? '<i class="ph ph-warning mr-1 text-lg"></i>[警告] 工單時間重疊' : '<i class="ph ph-check-circle mr-1 text-lg"></i>時間正常'}
                        </div>
                        ${detailHtml}
                    `);
                    block.onmousemove = (e) => updateTooltipPos(e);
                    block.onmouseleave = hideTooltip;

                    track.appendChild(block);
                });

                dayRow.appendChild(label);
                dayRow.appendChild(track);
                container.appendChild(dayRow);
            });

            const mtbody = document.getElementById('m-table-body');
            mtbody.innerHTML = '';
            data.raw.sort((a,b) => new Date(a[KEYS.START]) - new Date(b[KEYS.START])).forEach(r => {
                const s = new Date(r[KEYS.START]), e = new Date(r[KEYS.END]);
                mtbody.innerHTML += `<tr>
                    <td class="px-6 py-3 border-b border-slate-100 dark:border-slate-800 text-slate-600 dark:text-slate-300">${r[KEYS.PROC]}</td>
                    <td class="px-6 py-3 border-b border-slate-100 dark:border-slate-800 text-brand-600 dark:text-brand-400 font-bold">${r[KEYS.ORDER]}</td>
                    <td class="px-6 py-3 border-b border-slate-100 dark:border-slate-800 text-slate-500 dark:text-slate-400 font-mono text-xs">${fmtDt(s)} - ${fmtDt(e)}</td>
                    <td class="px-6 py-3 border-b border-slate-100 dark:border-slate-800 text-right text-slate-800 dark:text-slate-200 font-mono">${fmtHms(e-s)}</td>
                </tr>`;
            });
            
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            backdrop.classList.remove('hidden');
            void backdrop.offsetWidth; 
            backdrop.classList.remove('opacity-0');
            content.classList.remove('scale-95');
        }

        function closeModal() { 
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            backdrop.classList.add('opacity-0');
            content.classList.add('scale-95');
            hideTooltip();
            setTimeout(() => backdrop.classList.add('hidden'), 300);
        }
    </script>
</body>
</html>
